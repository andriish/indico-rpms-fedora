name: publish
on: 
  push:
  pull_request:  
  schedule:
    - cron: "0 7 * * 2"
  # Allows you to run this workflow manually from the Actions tab
#  workflow_dispatch:
  
# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
   contents: read
   pages: write
   id-token: write
   packages: write

#permissions: write-all

concurrency:
  group: "pages"
  cancel-in-progress: false
  
jobs:


  build-indico-docker-image-Fedora44:
    runs-on: ubuntu-latest
    name: Fedora image
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
          fetch-depth: 2 
    - name: Check if the Docker file was changed
      id: changed-docker-files
      uses: tj-actions/changed-files@v38
      with:
          files: Fedora44

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the indico Docker image on the change of Dockerfile
      if: steps.changed-docker-files.outputs.any_changed == 'true' 
      run: |
         docker build . -f Fedora44 --tag ghcr.io/andriish/indicofedora44:latest
         docker run ghcr.io/andriish/indicofedora44:latest
         docker push ghcr.io/andriish/indicofedora44:latest
    - name: Build the indico Docker image on schedule
      if: ${{ github.event_name == 'schedule' }}
      run: |
         docker build . -f Fedora44 --tag ghcr.io/andriish/indicofedora44:latest
         docker run ghcr.io/andriish/indicofedora44:latest
         docker push ghcr.io/andriish/indicofedora44:latest


  run-in-indico-docker-image-Fedora44:
    name: Fedora
    runs-on: ubuntu-latest
    needs: build-indico-docker-image-Fedora44
    container:
            image: ghcr.io/andriish/indicofedora44:latest
            credentials:
               username: ${{ github.actor }}
               password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
          fetch-depth: 3 
    - name: Run
      run : |
           set -x
           uname -a 
           cat /etc/issue      
           cd RPM
           bash rpm_alllocal.sh
           ls ./*/*/rpmbuild/RPMS/*/*.rpm
           cd ..
           mkdir -p myrepo/Fedora44
           cp RPM/*/*/rpmbuild/RPMS/*/*.rpm myrepo/Fedora44
           yum -y install createrepo
           createrepo myrepo/Fedora44
           ls -lah myrepo/Fedora44
           tar   -cvf artifact-Fedora44.tar myrepo
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
          name:  Fedora44af
          path: artifact-Fedora44.tar
 
  deploy-from-all:
    name: Deploy
    runs-on: ubuntu-latest    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}  
    needs: 
     - run-in-indico-docker-image-Fedora44
    steps:
    - uses: actions/download-artifact@v4
      with:
          name: Fedora44af
          path: myrepo

    - name: Display structure of downloaded files
      run: |
          ls -R myrepo
          cd  myrepo
          tar -xf artifact-Fedora44.tar
          mv myrepo indico336
          ls 
          rm ./*.tar -f
          cd ..
    - uses: jayanta525/github-pages-directory-listing@v4.0.0
      with:
          FOLDER: ./myrepo      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
          # Upload entire repository
          path: ./myrepo
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  
